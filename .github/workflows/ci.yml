name: ROS 2 CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  colcon-build-test:
    name: Build and test workspace
    runs-on: ubuntu-latest
    container:
      image: ros:humble-ros-base
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ROS 2 tooling
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git \
            python3-colcon-common-extensions \
            python3-rosdep \
            ros-humble-rosbag2 \
            ros-humble-rosbag2-storage-default-plugins
          rm -rf /var/lib/apt/lists/*

      - name: Install package dependencies
        run: |
          set -eo pipefail
          source /opt/ros/humble/setup.bash
          if [ ! -f /etc/ros/rosdep/sources.list.d/20-default.list ]; then
            rosdep init
          fi
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y --rosdistro humble

      - name: Build
        run: |
          set -eo pipefail
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install --event-handlers console_direct+

      - name: Test
        run: |
          set -eo pipefail
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          colcon test --event-handlers console_direct+ --return-code-on-test-failure

      - name: Launch smoke test
        timeout-minutes: 5
        run: |
          set -eo pipefail
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          bash scripts/ci_launch_topic_smoke.sh

      - name: SpO2 drop control smoke test
        timeout-minutes: 5
        run: |
          set -eo pipefail
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          SCENARIO=spo2_drop \
          CONTROL_LOW_SPO2=99.0 \
          EXPECTED_CONTROL_RULE_ID=control.oxygen_boost \
            bash scripts/ci_launch_topic_smoke.sh

      - name: Rosbag replay smoke test
        timeout-minutes: 8
        run: |
          set -eo pipefail
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          bash scripts/ci_rosbag_replay_smoke.sh

      - name: Show test results
        if: always()
        run: |
          source /opt/ros/humble/setup.bash
          colcon test-result --verbose || true

  docker-build:
    name: Build development image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Dockerfile
        run: docker build --pull -t ros2-medical-physical-ai-dev .
